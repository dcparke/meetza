<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meetza Extension Settings</title>
    <link rel="stylesheet" href="popup.css" />
  </head>

  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <img src="../icons/browser32.png" class="popup-icon" alt="" />

        <div>
          <h1>Meetza Extension Settings</h1>
          <p>Give a slice of your calendar</p>
        </div>
      </header>

      <section class="enabled-card">
        <div>
          <h2>Enabled in Gmail</h2>
          <p>Show Meetza in Gmail compose windows</p>
        </div>

        <label class="switch switch-large" aria-label="Enabled in Gmail">
          <input type="checkbox" data-setting="enabled" />
          <span class="switch-track"></span>
        </label>
      </section>

      <section class="popup-section">
        <div class="settings-grid-two">
          <label class="field-group">
            <span>Meeting Length</span>
            <div class="number-field">
              <input
                type="text"
                inputmode="numeric"
                pattern="[0-9]*"
                data-setting="duration"
              />
              <span>min</span>
            </div>
          </label>

          <label class="field-group">
            <span>Break</span>
            <div class="number-field">
              <input
                type="text"
                inputmode="numeric"
                pattern="[0-9]*"
                data-setting="breakMinutes"
              />
              <span>min</span>
            </div>
          </label>
        </div>

        <div class="field-group boundary-group">
          <span>Workday Boundary</span>

          <div class="boundary-row">
            <input
              type="text"
              inputmode="numeric"
              data-setting="workdayStart"
              aria-label="Workday start"
            />

            <span>to</span>

            <input
              type="text"
              inputmode="numeric"
              data-setting="workdayEnd"
              aria-label="Workday end"
            />
          </div>
        </div>

        <label class="field-group timezone-group">
          <span>Output Time Zone</span>
          <select data-setting="outputTimezone"></select>
        </label>
      </section>

      <section class="popup-section">
        <div class="popup-toggle-row compact-toggle">
          <div>
            <h2>Remember Recent People</h2>
            <p>Stores up to 15 entered email addresses locally for autocomplete</p>
          </div>

          <label class="switch" aria-label="Remember recent people">
            <input type="checkbox" data-setting="rememberRecentPeople" />
            <span class="switch-track"></span>
          </label>
        </div>

        <button type="button" class="secondary-button" data-clear-people>
          Clear Recent People
        </button>
      </section>

      <div class="popup-feedback" data-feedback hidden></div>

      <footer class="popup-actions">
        <button type="button" class="text-button" data-reset>
          Reset Defaults
        </button>

        <button type="button" class="primary-button" data-save>
          Save
        </button>
      </footer>
    </main>

    <script src="../shared/config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
